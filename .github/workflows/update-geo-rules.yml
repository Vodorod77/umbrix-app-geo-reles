name: Update Geo Rule-Sets

on:
  schedule:
    # Every 2 weeks: 1st and 15th of each month at 03:00 UTC
    - cron: '0 3 1,15 * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and verify SRS files
        id: download
        run: |
          BASE_BLOCK="https://raw.githubusercontent.com/hiddify/hiddify-geo/rule-set/block"
          BASE_COUNTRY="https://raw.githubusercontent.com/hiddify/hiddify-geo/rule-set/country"
          BASE_SAGERNET="https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set"

          FAILED=""

          download_and_check() {
            local url="$1"
            local output="$2"

            echo "Downloading: $output"
            if ! curl -sL --fail --max-time 30 "$url" -o "${output}.tmp"; then
              echo "  ERROR: download failed for $url"
              FAILED="$FAILED ${output}(download_failed)"
              rm -f "${output}.tmp"
              return 0
            fi

            # Check SRS v1 magic bytes using Python (no xxd needed)
            MAGIC=$(python3 -c "
with open('${output}.tmp', 'rb') as f:
    b = f.read(4)
print(b.hex())
")
            if [ "$MAGIC" = "53525301" ]; then
              mv "${output}.tmp" "$output"
              echo "  OK: $output (SRS v1)"
            else
              rm "${output}.tmp"
              echo "  SKIP: $output — incompatible format (magic=$MAGIC)"
              FAILED="$FAILED ${output}(SRS_v2)"
            fi
          }

          download_and_check "$BASE_BLOCK/geosite-category-ads-all.srs"   "geosite-category-ads-all.srs"
          download_and_check "$BASE_BLOCK/geosite-malware.srs"             "geosite-malware.srs"
          download_and_check "$BASE_BLOCK/geosite-phishing.srs"            "geosite-phishing.srs"
          download_and_check "$BASE_BLOCK/geosite-cryptominers.srs"        "geosite-cryptominers.srs"
          download_and_check "$BASE_BLOCK/geoip-phishing.srs"              "geoip-phishing.srs"
          download_and_check "$BASE_BLOCK/geoip-malware.srs"               "geoip-malware.srs"
          download_and_check "$BASE_SAGERNET/geosite-category-ads-all.srs" "sagernet-geosite-category-ads-all.srs"

          for region in ru ir; do
            download_and_check "$BASE_COUNTRY/geoip-${region}.srs"   "geoip-${region}.srs"
            download_and_check "$BASE_COUNTRY/geosite-${region}.srs" "geosite-${region}.srs"
          done

          if [ -n "$FAILED" ]; then
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
            printf 'failed_files<<=EOF\n%s\nEOF\n' "$FAILED" >> "$GITHUB_OUTPUT"
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue if incompatible files detected
        if: steps.download.outputs.has_failures == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const failedFiles = `${{ steps.download.outputs.failed_files }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Geo rule-set update failed: incompatible SRS format',
              body: [
                '## Auto-update failed',
                '',
                'Files that could not be updated (upstream may have switched to SRS v2):',
                '```',
                failedFiles.trim(),
                '```',
                '',
                '**Our sing-box v1.8.9 only supports SRS v1 (magic bytes `53525301`).**',
                '',
                'Options:',
                '1. Wait — upstream may revert to SRS v1',
                '2. Upgrade sing-box to a version supporting SRS v2',
                '',
                '_Existing files unchanged (last known good SRS v1)._',
              ].join('\n'),
              labels: ['bug', 'urgent'],
            });

      - name: Commit updated files
        if: steps.download.outputs.has_failures == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.srs
          if git diff --cached --quiet; then
            echo "No changes — files already up to date."
          else
            git commit -m "chore: update geo rule-sets $(date +'%Y-%m-%d')

All files verified as SRS v1 (magic bytes 53525301).
Sources: hiddify/hiddify-geo, SagerNet/sing-geosite"
            git push
            echo "Updated and pushed."
          fi
