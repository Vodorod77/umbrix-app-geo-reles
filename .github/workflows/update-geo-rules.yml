name: Update Geo Rule-Sets

on:
  schedule:
    - cron: '0 3 1,15 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and verify SRS files
        id: download
        run: python3 scripts/update_geo.py

      - name: Create issue if incompatible files detected
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Geo rule-set update failed',
              body: 'Upstream may have switched to SRS v2. Check workflow logs. sing-box v1.8.9 only supports SRS v1.',
              labels: ['bug', 'urgent'],
            });

      - name: Commit updated files
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.srs
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update geo rule-sets $(date +'%Y-%m-%d')"
            git push
          fi
